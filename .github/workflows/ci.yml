name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4 # reads the version from "packageManager" in package.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Type-check
        run: pnpm -r typecheck

      - name: Test
        run: pnpm test

      - name: Lint package metadata (publint)
        run: pnpm -r exec publint
